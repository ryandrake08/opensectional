; NASRBrowse chart style configuration
; Sections are [feature_key.chart_mode]
; All features must be specified; missing features render as bright magenta with oversized lines.
; Properties: min_zoom, max_zoom, color, r, g, b, a, line_width, border_width, dash_length, gap_length
; "color" accepts CSS color names or hex (#RRGGBB, #RRGGBBAA)
; Defaults: line_width=1, border_width=1, dash_length=0 (solid), gap_length=0

; --- Airports (zoom thresholds, matching associated airspace class) ---

[airport_class_b.vfr]
min_zoom = 7

[airport_class_c.vfr]
min_zoom = 8

[airport_class_d.vfr]
min_zoom = 9

[airport_class_e.vfr]
min_zoom = 10

[airport_other.vfr]
min_zoom = 11

; --- Airports (colors by type) ---

[airport_towered.vfr]
color = royalblue

[airport_untowered.vfr]
color = mediumorchid

; --- Navaids ---

[navaid_vor.vfr]
min_zoom = 9
color = limegreen

[navaid_ndb.vfr]
min_zoom = 9
color = saddlebrown

; --- Fixes (zoom thresholds, by airway membership) ---

[fix_airway.vfr]
min_zoom = 9

[fix_noairway.vfr]
min_zoom = 10

; --- Fixes (colors by type) ---

[fix_wp.vfr]
color = limegreen

[fix_rp.vfr]
color = limegreen

[fix_vfr.vfr]
color = saddlebrown

[fix_cn.vfr]
color = forestgreen

[fix_mr.vfr]
color = gray

[fix_mw.vfr]
color = gray

[fix_nrs.vfr]
color = darkslategray

; --- RCO (Remote Comm Outlets) ---

[rco.vfr]
min_zoom = 11
color = teal

; --- AWOS (Automated Weather Stations) ---

[awos.vfr]
min_zoom = 11
color = teal

; --- Obstacles ---

[obstacle_1000ft.vfr]
min_zoom = 12
color = crimson

[obstacle_200ft.vfr]
min_zoom = 13
color = orange

[obstacle_low.vfr]
min_zoom = 14
color = darkgray

; --- Airways ---
; Per-prefix colors. The altitude-band filter gates which airways actually
; render — high-altitude prefixes (J/Q/Y/H) only appear when the High band
; is enabled; low prefixes only when Low is enabled; dual-band prefixes
; (M/L/BR/AR/W/N/RTE) render in either.

; Low-altitude conventional/RNAV — dark cyan on VFR
[airway_v.vfr]
min_zoom = 9
color = darkcyan

[airway_t.vfr]
min_zoom = 9
color = darkcyan

[airway_tk.vfr]
min_zoom = 9
color = darkcyan

; High-altitude — use IFR high-chart colors (black for conventional,
; dark blue for RNAV) since they only show when the High band is on
[airway_j.vfr]
min_zoom = 9
color = black

[airway_q.vfr]
min_zoom = 9
color = darkblue

[airway_y.vfr]
min_zoom = 9
color = darkblue

[airway_h.vfr]
min_zoom = 9
color = black

; Dual-band (ICAO ATS / Bahama / Atlantic / Puerto Rico) — cyan in both
; bands per VFR convention
[airway_m.vfr]
min_zoom = 9
color = darkcyan

[airway_l.vfr]
min_zoom = 9
color = darkcyan

[airway_w.vfr]
min_zoom = 9
color = darkcyan

[airway_n.vfr]
min_zoom = 9
color = darkcyan

[airway_br.vfr]
min_zoom = 9
color = darkcyan

[airway_ar.vfr]
min_zoom = 9
color = darkcyan

[airway_rte.vfr]
min_zoom = 9
color = darkcyan

; LF/MF colored airways — magenta on VFR (low-altitude)
[airway_r.vfr]
min_zoom = 9
color = darkmagenta

[airway_a.vfr]
min_zoom = 9
color = darkmagenta

[airway_g.vfr]
min_zoom = 9
color = darkmagenta

[airway_b.vfr]
min_zoom = 9
color = darkmagenta

; --- Military training routes ---

[mtr.vfr]
min_zoom = 9
color = gray

; --- Parachute jump areas ---

[pja_area.vfr]
min_zoom = 8
color = tan
dash_length = 12
gap_length = 6

[pja_point.vfr]
min_zoom = 8
color = tan

; --- Miscellaneous activity areas ---

[maa_area.vfr]
min_zoom = 8
color = tan
dash_length = 12
gap_length = 6

[maa_point.vfr]
min_zoom = 8
color = tan

; --- ADIZ boundaries ---

[adiz.vfr]
min_zoom = 6
color = orchid
line_width = 2

; --- Class airspace ---

[airspace_b.vfr]
min_zoom = 5
color = royalblue
line_width = 2

[airspace_c.vfr]
min_zoom = 6
color = darkorchid
line_width = 2

[airspace_d.vfr]
min_zoom = 6
color = royalblue
dash_length = 12
gap_length = 6

; E2: airport surface area (dashed magenta on VFR)
[airspace_e2.vfr]
min_zoom = 9
color = darkorchid
dash_length = 12
gap_length = 6

; E3: extension to Class C surface area (dashed magenta on VFR)
[airspace_e3.vfr]
min_zoom = 9
color = darkorchid
dash_length = 12
gap_length = 6

; E4: extension to Class D/E surface area (dashed magenta on VFR)
[airspace_e4.vfr]
min_zoom = 9
color = darkorchid
dash_length = 12
gap_length = 6

; E5: upward from 700'+ AGL (magenta shading on VFR, not boundary lines)
[airspace_e5.vfr]
min_zoom = 99

; E6: en route domestic (not depicted on VFR)
[airspace_e6.vfr]
min_zoom = 99

; E7: offshore (not depicted on VFR)
[airspace_e7.vfr]
min_zoom = 99

; --- ARTCC boundaries ---

; Low altitude ARTCC boundaries (relevant for VFR)
[artcc_low.vfr]
min_zoom = 3
color = midnightblue

; High altitude ARTCC boundaries (differ slightly from low)
[artcc_high.vfr]
min_zoom = 3
color = midnightblue

; Oceanic/unlimited ARTCC boundaries
[artcc_oceanic.vfr]
min_zoom = 3
color = midnightblue

; --- Special use airspace ---

[sua_prohibited.vfr]
min_zoom = 6
color = crimson
line_width = 2

[sua_restricted.vfr]
min_zoom = 6
color = orange
line_width = 2

[sua_warning.vfr]
min_zoom = 6
color = orange
line_width = 2
dash_length = 15
gap_length = 8

[sua_alert.vfr]
min_zoom = 9
color = plum
line_width = 2

[sua_moa.vfr]
min_zoom = 7
color = plum
line_width = 2
dash_length = 15
gap_length = 8

[sua_nsa.vfr]
min_zoom = 9
color = saddlebrown
line_width = 2

; --- Runways ---

[runway.vfr]
min_zoom = 10
color = silver
line_width = 3
border_width = 0

; --- TFRs ---

[tfr.vfr]
min_zoom = 6
color = crimson
line_width = 2
dash_length = 15
gap_length = 8
