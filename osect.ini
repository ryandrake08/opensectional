; OpenSectional chart style configuration
; Sections are [feature_key.chart_mode]
; All features must be specified; missing features render as bright magenta with oversized lines.
; Properties: min_zoom, max_zoom, color, r, g, b, a, line_width, border_width, dash_length, gap_length
; "color" accepts CSS color names or hex (#RRGGBB, #RRGGBBAA)
; Defaults: line_width=1, border_width=1, dash_length=0 (solid), gap_length=0

; --- Route planner ---
;
; Configures the A* router used when a route string contains the
; `?` sigil. Preference values are PREFER, INCLUDE, AVOID, or
; REJECT (multipliers 0.8, 1.0, 1.25, 1000). The "Use airways"
; toggle in the GUI overrides the navaid and WP/RP/CN/MR fix
; subtypes to INCLUDE while it is on, and applies the airway-class
; preferences below to on-airway A* edges.

[route_plan]
max_leg_length_nm = 80

; Aerodrome subtypes (SITE_TYPE_CODE)
route_waypoint_airport       = INCLUDE
route_waypoint_balloonport   = REJECT
route_waypoint_seaplane_base = REJECT
route_waypoint_gliderport    = REJECT
route_waypoint_heliport      = REJECT
route_waypoint_ultralight    = REJECT

; Navaid subtypes (NAV_TYPE). When "Use airways" is on, all of
; these are forced to INCLUDE regardless of the configured value.
route_waypoint_vor    = INCLUDE
route_waypoint_vortac = INCLUDE
route_waypoint_vordme = INCLUDE
route_waypoint_dme    = INCLUDE
route_waypoint_ndb    = INCLUDE
route_waypoint_ndbdme = INCLUDE

; VFR fix (FIX_USE_CODE = 'VFR'). The other airway-routable fix
; subtypes (WP, RP, CN, MR) are not configurable here — they are
; REJECT when "Use airways" is off and INCLUDE when it is on.
route_waypoint_vfr = INCLUDE

; Airway classes. Applied only when "Use airways" is on.
route_airway_victor = PREFER
route_airway_jet    = REJECT
route_airway_rnav   = INCLUDE
route_airway_color  = REJECT
route_airway_other  = REJECT

; Cost factor for crossing a published gap on an airway. Applied
; only when "Use airways" is on and replaces the airway-class
; preference for that single segment. INCLUDE (default) treats
; the gap-bridge as cost-neutral relative to a generic direct
; leg. PREFER makes airway-following cost-attractive even
; through gaps — useful if you want a route that names a
; specific airway to win over an alternative that switches
; airways to avoid the gap. AVOID/REJECT push A* away from
; gap-bridging when an alternate airway routing is available.
route_airway_gap = PREFER

; --- Airports (zoom thresholds, matching associated airspace class) ---

[airport_class_b.vfr]
min_zoom = 7

[airport_class_c.vfr]
min_zoom = 8

[airport_class_d.vfr]
min_zoom = 9

[airport_class_e.vfr]
min_zoom = 10

[airport_other.vfr]
min_zoom = 11

; --- Airports (colors by type) ---

[airport_towered.vfr]
color = royalblue

[airport_untowered.vfr]
color = mediumorchid

; --- Navaids ---

[navaid_vor.vfr]
min_zoom = 9
color = limegreen

[navaid_ndb.vfr]
min_zoom = 9
color = saddlebrown

; --- Fixes (zoom thresholds, by airway membership) ---

[fix_airway.vfr]
min_zoom = 9

[fix_noairway.vfr]
min_zoom = 10

; --- Fixes (colors by type) ---

[fix_wp.vfr]
color = limegreen

[fix_rp.vfr]
color = limegreen

[fix_vfr.vfr]
color = saddlebrown

[fix_cn.vfr]
color = forestgreen

[fix_mr.vfr]
color = gray

[fix_mw.vfr]
color = gray

[fix_nrs.vfr]
color = darkslategray

; --- RCO (Remote Comm Outlets) ---

[rco.vfr]
min_zoom = 11
color = teal

; --- AWOS (Automated Weather Stations) ---

[awos.vfr]
min_zoom = 11
color = teal

; --- Obstacles ---

[obstacle_1000ft.vfr]
