[airspace_b.vfr]
min_zoom = 5
color = royalblue
line_width = 2

[airspace_c.vfr]
min_zoom = 6
color = darkorchid
line_width = 2

[airspace_d.vfr]
min_zoom = 6
color = royalblue
dash_length = 12
gap_length = 6

; E2: airport surface area (dashed magenta on VFR)
[airspace_e2.vfr]
min_zoom = 9
color = darkorchid
dash_length = 12
gap_length = 6

; E3: extension to Class C surface area (dashed magenta on VFR)
[airspace_e3.vfr]
min_zoom = 9
color = darkorchid
dash_length = 12
gap_length = 6

