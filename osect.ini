color = darkgray

; --- Airways ---
; Per-prefix colors. The altitude-band filter gates which airways actually
; render — high-altitude prefixes (J/Q/Y/H) only appear when the High band
; is enabled; low prefixes only when Low is enabled; dual-band prefixes
; (M/L/BR/AR/W/N/RTE) render in either.

; Low-altitude conventional/RNAV — dark cyan on VFR
[airway_v.vfr]
min_zoom = 9
color = darkcyan

[airway_t.vfr]
min_zoom = 9
color = darkcyan

[airway_tk.vfr]
min_zoom = 9
color = darkcyan

; High-altitude — use IFR high-chart colors (black for conventional,
; dark blue for RNAV) since they only show when the High band is on
[airway_j.vfr]
min_zoom = 9
color = black

[airway_q.vfr]
min_zoom = 9
color = darkblue

[airway_y.vfr]
min_zoom = 9
color = darkblue

[airway_h.vfr]
min_zoom = 9
color = black

; Dual-band (ICAO ATS / Bahama / Atlantic / Puerto Rico) — cyan in both
; bands per VFR convention
[airway_m.vfr]
min_zoom = 9
color = darkcyan

[airway_l.vfr]
min_zoom = 9
color = darkcyan

[airway_w.vfr]
min_zoom = 9
color = darkcyan

[airway_n.vfr]
min_zoom = 9
color = darkcyan

[airway_br.vfr]
min_zoom = 9
color = darkcyan

[airway_ar.vfr]
min_zoom = 9
color = darkcyan

[airway_rte.vfr]
min_zoom = 9
color = darkcyan

; LF/MF colored airways — magenta on VFR (low-altitude)
[airway_r.vfr]
min_zoom = 9
color = darkmagenta

[airway_a.vfr]
min_zoom = 9
color = darkmagenta

[airway_g.vfr]
min_zoom = 9
color = darkmagenta

[airway_b.vfr]
min_zoom = 9
color = darkmagenta

; --- Military training routes ---

[mtr.vfr]
min_zoom = 9
color = gray

