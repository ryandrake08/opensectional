; E5: upward from 700'+ AGL (magenta shading on VFR, not boundary lines)
[airspace_e5.vfr]
min_zoom = 99

; E6: en route domestic (not depicted on VFR)
[airspace_e6.vfr]
min_zoom = 99

; E7: offshore (not depicted on VFR)
[airspace_e7.vfr]
min_zoom = 99

; --- ARTCC boundaries ---

; Low altitude ARTCC boundaries (relevant for VFR)
[artcc_low.vfr]
min_zoom = 3
color = midnightblue

; High altitude ARTCC boundaries (differ slightly from low)
[artcc_high.vfr]
min_zoom = 3
color = midnightblue

; Oceanic Flight Information Region (FIR). CTA/FIR polygons are drawn
; under both this style and artcc_unlimited_cta.
[artcc_unlimited_fir.vfr]
min_zoom = 3
color = midnightblue

; Oceanic Control Area (CTA). CTA/FIR polygons are drawn under both
; this style and artcc_unlimited_fir.
[artcc_unlimited_cta.vfr]
min_zoom = 99

; Oceanic Upper Control Area (UTA).
[artcc_unlimited_uta.vfr]
min_zoom = 99

